# Node with battery, named power states, and ambient generation rate.

[params]
timestep.length = 1
timestep.unit = "s"
timestep.count = 5
seed = 42
root = "~/simulations"

[nodes]

[nodes.main]
# Always-on solar panel generating 400 mW
ambient_rate = { rate = 400, unit = "mw", time = "s" }
deployments = [{ charge = { max = 1000, quantity = 800, unit = "mwh" }, initial_state = "active" }]

[nodes.main.power_states]
sleep    = { rate = 20,  unit = "uw", time = "s" }
standby  = { rate = 200, unit = "uw", time = "s" }
active   = { rate = 80,  unit = "mw", time = "s" }

[[nodes.main.protocols]]

name = "main"
runner = "python3"
runner_args = ["client.py"]
