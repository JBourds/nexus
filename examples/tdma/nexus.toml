# Simulate a shared medium using a CSMA protocol over simulated radio.

[params]
timestep.length = 1
timestep.unit = "ms"
timestep.count = 60000 
seed = 42                       
root = "~/simulations"  

[channels]

[channels.radio]
link = "ideal"
type = { type = "shared", ttl = 100, unit = "ms", read_own_writes = true  }

[nodes]

[nodes.gateway]
deployments = [
    { position = { point = { x = 0, y = 0, z = 0 } } }
]

[[nodes.gateway.protocols]]

name = "main"
runner = "python3"
runner_args = ["gateway.py"]
publishers = ["radio"]
subscribers = ["radio"]

[nodes.peripheral]
deployments = [ 
    { run_args = ["1"], position = { point = { x = -1, y = 0, z = 0 }, unit = "km" }},
    { run_args = ["2"], position = { point = { x = 0, y = 1, z = 0 }, unit = "km" }},
    { run_args = ["3"], position = { point = { x = 1, y = 0, z = 0 }, unit = "km" }},
    { run_args = ["4"], position = { point = { x = 0, y = -1, z = 0 }, unit = "km" }},
    { run_args = ["5"], position = { point = { x = 0, y = 1, z = 0 }, unit = "km" }},
    { run_args = ["6"], position = { point = { x = 1, y = 0, z = 0 }, unit = "km" }},
    { run_args = ["7"], position = { point = { x = 0, y = -1, z = 0 }, unit = "km" }},
]

[[nodes.peripheral.protocols]]

name = "main"
runner = "python3"
runner_args = ["peripheral.py"]
publishers = ["radio"]
subscribers = ["radio"]

