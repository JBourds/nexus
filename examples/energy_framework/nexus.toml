# Energy Framework Demo
#
# A sensor network where nodes drain battery at different rates.
# - "gateway" has unlimited power (no charge)
# - "sensor_a" has a solar panel that partially offsets its drain
# - "sensor_b" has no solar — it will die and restart when charged by ambient source
# - "sensor_c" has high TX costs that accelerate drain on every send
#
# Open in the GUI to watch charge bars go green→yellow→red→dead.

[params]
timestep.length = 10
timestep.unit   = "ms"
timestep.count  = 5000
seed            = 42
root            = "~/simulations"

# --- Channels ---

[channels.uplink]
type = { type = "exclusive", ttl = 500, unit = "ms" }

[channels.downlink]
type = { type = "exclusive", ttl = 500, unit = "ms" }

# --- Gateway (mains-powered, no battery) ---

[nodes.gateway]
deployments = [{ position = { point = [0, 0, 0], unit = "km" } }]

[[nodes.gateway.protocols]]
name        = "gw"
runner      = "python3"
runner_args = ["gateway.py"]
publishers  = ["downlink"]
subscribers = ["uplink"]

# --- Sensor A: solar-assisted ---

[nodes.sensor_a]
deployments = [{ position = { point = [-20, 15, 0], unit = "km" }, charge = { max = 5000, quantity = 5000, unit = "mj" }, initial_state = "active", restart_threshold = 0.10 }]

[nodes.sensor_a.power_states]
sleep  = { rate = 5,   unit = "mw", time = "s" }
active = { rate = 120, unit = "mw", time = "s" }

[nodes.sensor_a.power_sources]
solar = { rate = 80, unit = "mw", time = "s" }

[nodes.sensor_a.power_sinks]
mcu = { rate = 15, unit = "mw", time = "s" }

[nodes.sensor_a.channel_energy.uplink]
tx = { quantity = 50, unit = "uj" }

[[nodes.sensor_a.protocols]]
name        = "fw"
runner      = "python3"
runner_args = ["sensor.py"]
publishers  = ["uplink"]
subscribers = ["downlink"]

# --- Sensor B: no solar, will die ---

[nodes.sensor_b]
deployments = [{ position = { point = [20, 15, 0], unit = "km" }, charge = { max = 3000, quantity = 3000, unit = "mj" }, initial_state = "active", restart_threshold = 0.15 }]

[nodes.sensor_b.power_states]
sleep  = { rate = 5,   unit = "mw", time = "s" }
active = { rate = 150, unit = "mw", time = "s" }

[nodes.sensor_b.power_sinks]
mcu = { rate = 20, unit = "mw", time = "s" }

[[nodes.sensor_b.protocols]]
name        = "fw"
runner      = "python3"
runner_args = ["sensor.py"]
publishers  = ["uplink"]
subscribers = ["downlink"]

# --- Sensor C: high TX cost ---

[nodes.sensor_c]
deployments = [{ position = { point = [0, -20, 0], unit = "km" }, charge = { max = 4000, quantity = 4000, unit = "mj" }, initial_state = "active", restart_threshold = 0.05 }]

[nodes.sensor_c.power_states]
sleep  = { rate = 5,   unit = "mw", time = "s" }
active = { rate = 100, unit = "mw", time = "s" }

[nodes.sensor_c.power_sinks]
mcu = { rate = 10, unit = "mw", time = "s" }

[nodes.sensor_c.channel_energy.uplink]
tx = { quantity = 500, unit = "uj" }
rx = { quantity = 100, unit = "uj" }

[[nodes.sensor_c.protocols]]
name        = "fw"
runner      = "python3"
runner_args = ["sensor.py"]
publishers  = ["uplink"]
subscribers = ["downlink"]
