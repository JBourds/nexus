# Mobile Nodes Demo
#
# Nodes that move in different patterns while communicating.
# - "base" is stationary at the center
# - "patrol" moves in a circle around the base
# - "scout" moves linearly across the field then reverses
# - "drift" drifts at constant velocity
#
# Open in the GUI to watch nodes move on the grid in real time.

[params]
timestep.length = 10
timestep.unit   = "ms"
timestep.count  = 10000
seed            = 7
root            = "~/simulations"

# --- Channel ---

[channels.radio]
type = { type = "exclusive", ttl = 200, unit = "ms" }

# --- Base Station (stationary) ---

[nodes.base]
deployments = [{ position = { point = [0, 0, 0], unit = "km" } }]

[[nodes.base.protocols]]
name        = "base"
runner      = "python3"
runner_args = ["base.py"]
publishers  = ["radio"]
subscribers = ["radio"]

# --- Patrol (circles the base) ---

[nodes.patrol]
deployments = [{ position = { point = [15, 0, 0], unit = "km" } }]

[[nodes.patrol.protocols]]
name        = "patrol"
runner      = "python3"
runner_args = ["patrol.py"]
publishers  = ["radio"]
subscribers = ["radio"]

# --- Scout (linear back-and-forth) ---

[nodes.scout]
deployments = [{ position = { point = [-20, -10, 0], unit = "km" } }]

[[nodes.scout.protocols]]
name        = "scout"
runner      = "python3"
runner_args = ["scout.py"]
publishers  = ["radio"]
subscribers = ["radio"]

# --- Drift (constant velocity) ---

[nodes.drift]
deployments = [{ position = { point = [-15, 20, 0], unit = "km" } }]

[[nodes.drift.protocols]]
name        = "drift"
runner      = "python3"
runner_args = ["drift.py"]
publishers  = ["radio"]
subscribers = ["radio"]
