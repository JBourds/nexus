# Cat-6 Copper Ethernet
#
# Source: TIA/EIA-568-B.2-10 specification
# - Data rate: 10 Gbps (10GBASE-T, up to 55 m)
# - Max segment length: 100 m at 1 Gbps
# - RLGC values approximate for Cat-6 at 250 MHz
#
# Assumptions:
# - Modeled at 1 Gbps for general use (same as Cat-5e throughput)
# - Lower crosstalk than Cat-5e (better RLGC values)

[links.ethernet_cat6]
medium.type = "wired"
medium.rx_min_dbm = -28.0
medium.tx_min_dbm = -10.0
medium.tx_max_dbm = 0.0
medium.r = 0.187
medium.l = 0.000000500
medium.c = 0.0000000000050
medium.g = 0.0000000005
medium.f = 250000000.0
packet_loss = "0"

[links.ethernet_cat6.delays]
transmission.rate = 1
transmission.data = "gB"
transmission.time = "s"
propagation.rate = "d / 200000"
propagation.distance = "km"
propagation.time = "s"

[channels.ethernet_cat6]
link = "ethernet_cat6"
type = { type = "exclusive", ttl = 100, unit = "ms", max_size = 1500 }
