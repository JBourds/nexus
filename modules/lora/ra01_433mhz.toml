# AI-Thinker Ra-01 LoRa Module at 433 MHz
#
# Source: AI-Thinker Ra-01 datasheet (based on SX1278/SX1276)
# Ref:    https://semtech.my.salesforce.com/sfc/p/E0000000JelG/a/2R0000001OKs/Bs97dmPXeatnbdoJNVMIDaKDlQz8q1N_gxDcgqi7g2o
# - Frequency: 433 MHz ISM band
# - Max TX power: +20 dBm
#
# Each spreading factor (SF6-SF12) at BW 125 kHz / CR 4/5 is defined as
# a separate link and channel. The unsuffixed names default to SF6.
# Sensitivities per SX1278 datasheet.
# The 433 MHz band yields ~2 dB better sensitivity than 868/915 MHz.

# --- SF6 (default): 9375 bps, sensitivity -122 dBm ---

[links.lora_433]
medium.type = "wireless"
medium.wavelength_meters = 0.693
medium.gain_dbi = 2.0
medium.rx_min_dbm = -122.0
medium.tx_min_dbm = -4.0
medium.tx_max_dbm = 20.0
medium.shape = "omni"
packet_loss = "1 / (1 + exp((rssi + 103) / 5))"

[links.lora_433.delays]
transmission.rate = 9375
transmission.data = "bit"
transmission.time = "s"
propagation.rate = "d / 299792.458"
propagation.distance = "km"
propagation.time = "s"

[channels.lora_433]
link = "lora_433"
type = { type = "exclusive", ttl = 2000, unit = "ms", max_size = 255 }

[channels.lora_433_sf6]
link = "lora_433"
type = { type = "exclusive", ttl = 2000, unit = "ms", max_size = 255 }

