# Semtech SX1276 LoRa transceiver at 915 MHz (Americas ISM band)
#
# Source: Semtech SX1276/77/78/79 datasheet, Rev 7 (May 2020)
# - Frequency range: 137-1020 MHz
# - Max TX power: +20 dBm (100 mW) with PA_BOOST
# - Typical antenna gain: ~2 dBi (quarter-wave whip)
#
# Each spreading factor (SF6-SF12) at BW 125 kHz / CR 4/5 is defined as
# a separate link and channel. Higher SF = longer range, lower data rate.
# The unsuffixed names (links.lora_915, channels.lora) default to SF6.
#
# Data rates: SF * BW / 2^SF * CR  (BW=125 kHz, CR=4/5)
# Sensitivities per SX1276 datasheet Table 10

# --- SF6 (default): 9375 bps, sensitivity -120 dBm ---

[links.lora_915]
medium.type = "wireless"
medium.wavelength_meters = 0.328
medium.gain_dbi = 2.0
medium.rx_min_dbm = -120.0
medium.tx_min_dbm = -4.0
medium.tx_max_dbm = 20.0
medium.shape = "omni"
packet_loss = "1 / (1 + exp((rssi + 103) / 5))"

[links.lora_915.delays]
transmission.rate = 9375
transmission.data = "bit"
transmission.time = "s"
propagation.rate = "d / 299792.458"
propagation.distance = "km"
propagation.time = "s"

[channels.lora]
link = "lora_915"
type = { type = "exclusive", ttl = 2000, unit = "ms", max_size = 255 }

[channels.lora_sf6]
link = "lora_915"
type = { type = "exclusive", ttl = 2000, unit = "ms", max_size = 255 }

