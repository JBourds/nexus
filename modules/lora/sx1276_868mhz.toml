# Semtech SX1276 LoRa transceiver at 868 MHz (EU ISM band)
#
# Source: Semtech SX1276/77/78/79 datasheet, Rev 7 (May 2020)
# - Same transceiver as sx1276_915mhz, tuned to 868 MHz
# - EU duty cycle limits apply (not modeled here)
# - Max TX power: +14 dBm (25 mW) per EU regulation
#
# Each spreading factor (SF6-SF12) at BW 125 kHz / CR 4/5 is defined as
# a separate link and channel. The unsuffixed names default to SF6.
#
# Sensitivities per SX1276 datasheet Table 10

# --- SF6 (default): 9375 bps, sensitivity -120 dBm ---

[links.lora_868]
medium.type = "wireless"
medium.wavelength_meters = 0.346
medium.gain_dbi = 2.0
medium.rx_min_dbm = -120.0
medium.tx_min_dbm = -4.0
medium.tx_max_dbm = 14.0
medium.shape = "omni"
packet_loss = "1 / (1 + exp((rssi + 103) / 5))"

[links.lora_868.delays]
transmission.rate = 9375
transmission.data = "bit"
transmission.time = "s"
propagation.rate = "d / 299792.458"
propagation.distance = "km"
propagation.time = "s"

[channels.lora_eu]
link = "lora_868"
type = { type = "exclusive", ttl = 2000, unit = "ms", max_size = 255 }

[channels.lora_eu_sf6]
link = "lora_868"
type = { type = "exclusive", ttl = 2000, unit = "ms", max_size = 255 }

