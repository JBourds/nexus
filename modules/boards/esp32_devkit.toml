# ESP32 DevKit v1 (Espressif ESP32-WROOM-32)
#
# Source: Espressif ESP32 Datasheet v4.6, Section 4.8 "Current Consumption"
#         ESP32 Technical Reference Manual v5.3
# Ref:    https://www.espressif.com/sites/default/files/documentation/esp32_datasheet_en.pdf
#
# - Dual-core Xtensa LX6 @ 240 MHz
# - 520 KB SRAM
# - Operating voltage: 3.3V
# - Active current: ~100 mA typical @ 3.3V = ~330 mW
# - Light sleep: ~0.8 mA @ 3.3V = ~2.6 mW
# - Deep sleep: ~10 uA @ 3.3V = ~33 uW
# - Modem sleep: ~20 mA @ 3.3V = ~66 mW (CPU on, Wi-Fi off)
# - Wi-Fi TX: ~180 mA @ 3.3V = ~600 mW
#
# Assumptions:
# - Single-core modeled (240 MHz)
# - Power = current * 3.3V
# - MCU baseline sink represents always-on peripheral draw (~30 mA)

[profiles.esp32]

[profiles.esp32.resources]
clock_rate = 240
clock_units = "mhz"
ram = 520
ram_units = "kb"

[profiles.esp32.power_states]
deep_sleep  = { rate = 33,  unit = "uw", time = "s" }
light_sleep = { rate = 2640, unit = "uw", time = "s" }
modem_sleep = { rate = 66,  unit = "mw", time = "s" }
active      = { rate = 330, unit = "mw", time = "s" }
wifi_active = { rate = 600, unit = "mw", time = "s" }

[profiles.esp32.power_sinks]
mcu = { rate = 99, unit = "mw", time = "s" }
