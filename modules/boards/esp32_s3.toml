# ESP32-S3 (Espressif ESP32-S3-WROOM-1)
#
# Source: Espressif ESP32-S3 Datasheet v1.4, Table "Power Consumption"
# Ref:    https://www.espressif.com/sites/default/files/documentation/esp32-s3_datasheet_en.pdf
#
# - Dual-core Xtensa LX7 @ 240 MHz
# - 512 KB SRAM
# - Operating voltage: 3.3V
# - Active: ~100 mA @ 3.3V = ~330 mW
# - Light sleep: ~0.24 mA @ 3.3V = ~790 uW
# - Deep sleep: ~7 uA @ 3.3V = ~23 uW
# - Wi-Fi TX: ~200 mA @ 3.3V = ~660 mW

[profiles.esp32_s3]

[profiles.esp32_s3.resources]
clock_rate = 240
clock_units = "mhz"
ram = 512
ram_units = "kb"

[profiles.esp32_s3.power_states]
deep_sleep  = { rate = 23,   unit = "uw", time = "s" }
light_sleep = { rate = 790,  unit = "uw", time = "s" }
active      = { rate = 330,  unit = "mw", time = "s" }
wifi_active = { rate = 660,  unit = "mw", time = "s" }

[profiles.esp32_s3.power_sinks]
mcu = { rate = 83, unit = "mw", time = "s" }
